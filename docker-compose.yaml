version: '3.8'

services:
  mariadb:
    image: mariadb:11.4
    container_name: petspot_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: petspot
      MARIADB_USER: petspot
      MARIADB_PASSWORD: PetSpot
    volumes:
      - D:\docker\mariadb_data:/var/lib/mysql
      - ./petspot_database.sql:/docker-entrypoint-initdb.d/petspot_database.sql
    ports:
      - "3306:3306" # mariadb usa 3306
    networks:
      - petspot_network

  app:
    build: .
    container_name: petspot_api
    restart: unless-stopped
    ports:
      - "443:443" 
    environment:
      - PORT=443
      - DB_HOST=mariadb
      - DB_USER=petspot
      - DB_PASSWORD=PetSpot
      - DB_NAME=petspot
    networks:
      - petspot_network
    depends_on:
      - mariadb

networks:
  petspot_network:
    name: petspot_network