<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSpot — Chat</title>
<link rel="stylesheet" href="../../ambos/shared.css">
</head>
<body class="veterinario">
<div class="main">
  <div class="page-header">
    <div><h1>Chat</h1><p>Mensajes con tus clientes</p></div>
  </div>
  <div class="chat-layout">
    <div class="chat-list">
      <!-- Buscador por email para añadir clientes al chat -->
      <div style="padding:10px 12px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px">Buscar cliente por email</div>
        <div style="display:flex;gap:6px">
          <div class="search-bar" style="flex:1">
            <span id="icon-search"></span>
            <input type="email" id="search-email" placeholder="correo@gmail.com" onkeydown="if(event.key==='Enter') buscarCliente()">
          </div>
          <button class="btn btn-primary btn-sm" onclick="buscarCliente()">+</button>
        </div>
      </div>
      <div id="chat-list-items"></div>
    </div>
    <div class="chat-window">
      <div class="chat-header">
        <div class="topbar-avatar" style="width:40px;height:40px;font-size:16px;flex-shrink:0;border-radius:50%" id="chat-av">?</div>
        <div>
          <div style="font-weight:700;font-size:15px" id="chat-name">—</div>
          <div style="font-size:12px;color:var(--text2)" id="chat-sub">—</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="btn btn-primary btn-sm" id="btn-send" onclick="sendMsg()"></button>
      </div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../../ambos/firebase-config.js"></script>
<script src="../../ambos/icons.js"></script>
<script src="../../ambos/shared.js"></script>
<script src="../../ambos/layout.js"></script>
<script src="../scripts/chat.js"></script>
</body>
</html>
