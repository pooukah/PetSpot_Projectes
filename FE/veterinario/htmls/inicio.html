<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSpot — Inicio</title>

<link rel="stylesheet" href="../../ambos/shared.css">
<link rel="stylesheet" href="../styles/inicio.css">
</head>

<body class="veterinario">

<div class="main">

  <div class="page-header">
    <div>
      <h1>Inicio</h1>
      <p id="date-chip-vet"></p>
    </div>
  </div>
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-icon" id="icon-cal"></div>
      <div class="stat-label">Citas pendientes</div>
      <div class="stat-value" id="stat-citas"></div>
    </div>

    <div class="stat-card">
      <div class="stat-icon" id="icon-msg"></div>
      <div class="stat-label">Mensajes</div>
      <div class="stat-value" id="stat-msg">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-icon" id="icon-shop"></div>
      <div class="stat-label">Pedidos pendientes</div>
      <div class="stat-value" id="stat-pedidos"></div>
    </div>
  </div>
  <div class="vet-inicio-grid">
    <div>
      <div class="card" style="margin-bottom:18px">
        <div class="card-title">
          <span id="icon-cal-title"></span>
          Próximas citas
          <a href="citas.html" class="card-title-action">
          </a>
        </div>
        <div id="hoy-citas"></div>
      </div>
      <div class="card">
        <div class="card-title">
          <span id="icon-euro"></span>
          Ingresos esta semana
        </div>

        <div class="bar-chart-wrap">
          <div class="bar-chart" id="ingr-chart"></div>
          <div class="bar-chart-labels" id="ingr-labels"></div>
        </div>

      </div>

    </div>

  </div>

</div>
<script src="../../ambos/icons.js"></script>
<script src="../../ambos/shared.js"></script>
<script src="../../ambos/layout.js"></script>
<script src="../scripts/inicio.js"></script>
</body>
</html>
