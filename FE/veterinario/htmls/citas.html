<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSpot — Agenda de Citas</title>
<link rel="stylesheet" href="../../ambos/shared.css">
<link rel="stylesheet" href="../styles/citas.css">
</head>
<body class="veterinario">

<div class="main">
  <div class="page-header">
    <div><h1>Agenda de citas</h1><p>Gestiona todas tus consultas</p></div>
    <div style="display:flex;gap:10px;align-items:center">
      <input type="date" class="form-input" style="width:170px" value="2026-03-17">
      <button class="btn btn-primary" id="btn-nueva"><span id="icon-plus"></span> Nueva cita</button>
    </div>
  </div>

  <div class="citas-toolbar">
    <div class="tabs" style="margin-bottom:0">
      <button class="tab active" onclick="filterCitas('todas',this)">Todas</button>
      <button class="tab" onclick="filterCitas('pendiente',this)">Pendientes</button>
      <button class="tab" onclick="filterCitas('confirmada',this)">Confirmadas</button>
    </div>
    <div class="search-bar" style="max-width:260px">
      <span id="icon-search"></span>
      <input type="text" placeholder="Buscar cliente o mascota..." oninput="searchCitas(this.value)">
    </div>
  </div>

  <div class="card" style="padding:0">
    <table class="table">
      <thead>
        <tr>
          <th>Hora</th><th>Fecha</th><th>Cliente</th><th>Mascota</th><th>Motivo</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="citas-body"></tbody>
    </table>
  </div>
</div>

<!-- Modal nueva cita - CORREGIDO con IDs -->
<div class="modal-overlay" id="modal-nueva">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nueva cita</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()"><span id="icon-x"></span></button>
    </div>
    <div class="form-group">
      <label class="form-label">Cliente</label>
      <select class="form-input" id="nueva-cliente">
        <option value="">— Selecciona —</option>
        <option value="María Fernández">María Fernández</option>
        <option value="Jordi Puig">Jordi Puig</option>
        <option value="Ana González">Ana González</option>
        <option value="Carlos Rodríguez">Carlos Rodríguez</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Mascota</label>
      <select class="form-input" id="nueva-mascota">
        <option value="">— Selecciona —</option>
        <option value="Kira (Perro)">Kira (Perro)</option>
        <option value="Rocky (Perro)">Rocky (Perro)</option>
        <option value="Perla (Gato)">Perla (Gato)</option>
        <option value="Max (Perro)">Max (Perro)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Motivo</label>
      <input class="form-input" id="nueva-motivo" placeholder="Revisión, vacunación...">
    </div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-input" id="nueva-fecha">
      </div>
      <div class="form-group">
        <label class="form-label">Hora</label>
        <select class="form-input" id="nueva-hora">
          <option>09:00</option><option>09:30</option><option>10:00</option>
          <option>10:30</option><option>11:00</option><option>11:30</option>
          <option>12:00</option><option>16:00</option><option>16:30</option>
          <option>17:00</option><option>17:30</option><option>18:00</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addCita()">Crear cita</button>
  </div>
</div>

<script src="../../ambos/icons.js"></script>
<script src="../../ambos/shared.js"></script>
<script src="../../ambos/layout.js"></script>
<script src="../scripts/citas.js"></script>
</body>
</html>
