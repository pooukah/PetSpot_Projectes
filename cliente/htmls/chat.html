<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSpot — Chat</title>
<link rel="stylesheet" href="../../ambos/shared.css">
<link rel="stylesheet" href="../styles/chat.css">
</head>
<body class="cliente">
<div class="main">
  <div class="page-header">
    <div><h1>Chat</h1><p>Mensajes con tus veterinarios</p></div>
  </div>
  <div class="chat-layout">
    <div class="chat-list">
      <div class="chat-search-wrap">
        <div class="search-bar">
          <span id="icon-search"></span>
          <input type="text" placeholder="Buscar conversación...">
        </div>
      </div>
      <div id="chat-list-items"></div>
    </div>
    <div class="chat-window">
      <div class="chat-header">
        <div class="topbar-avatar" style="width:40px;height:40px;font-size:16px;flex-shrink:0;border-radius:50%" id="chat-av">?</div>
        <div>
          <div style="font-weight:700;font-size:15px" id="chat-name">—</div>
          <div style="font-size:12px;color:var(--accent)">● En línea</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="btn btn-primary btn-sm" id="btn-send" onclick="sendMsg()"></button>
      </div>
    </div>
  </div>
</div>
<script src="../../ambos/icons.js"></script>
<script src="../../ambos/shared.js"></script>
<script src="../../ambos/layout.js"></script>
<script src="../scripts/chat.js"></script>
</body>
</html>
